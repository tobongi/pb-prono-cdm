version: "3.8"

services:
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - internal

  worldcup:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/worldcup
      - PORT=3002
    volumes:
      - ./apps/worldcup-api:/app
    ports:
      - "3002:3002"
    depends_on: [mongodb]
    networks:
      - internal

  proxy:
    build: ./apps/proxy
    ports:
      - "3001:3001"
    environment:
      - WORLDCUP_API_URL=http://worldcup:3002
      - WEB_URL=${WEB_URL:-http://localhost:3000}
    depends_on: [worldcup]
    networks:
      - internal

volumes:
  mongo_data:

networks:
  internal:
